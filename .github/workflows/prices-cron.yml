# Cron diario que refresca prices_history para los portátiles ya existentes
# en BD. Reutiliza scripts/scrape-catalog.ts en modo --prices-only:
# - Salta laptops/specs/affiliate_links (no añade catálogo nuevo).
# - Añade un punto a prices_history por cada slug ya en BD.
#
# El catálogo crece sólo cuando el cron semanal (catalog-cron.yml) o un run
# manual local corre el modo completo.
name: Refrescar precios (diario)

on:
  schedule:
    # 06:00 UTC = 07:00 invierno / 08:00 verano en España. Hora valle.
    - cron: '0 6 * * *'
  # Permite dispararlo desde la UI de Actions (útil para validar tras merge).
  workflow_dispatch:

# Si el run anterior aún corre, cancela y arranca el nuevo. Evita acumulación.
concurrency:
  group: prices-cron
  cancel-in-progress: true

jobs:
  refresh-prices:
    name: Refrescar prices_history
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Refrescar precios de todo el catálogo (by-brand)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # --by-brand para refrescar precios de TODO el catálogo (~3,700), no solo
        # los primeros 1000 que permite la paginación de Algolia. limit 10000 =
        # tope de seguridad; el bucle para cuando se agotan las marcas.
        run: npm run scrape:catalog -- --prices-only --by-brand --limit 10000

      - name: Comprobar alertas de bajada de precio
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Sin estos secrets corre en modo dry (loguea, no envía). Para activar el
          # envío vía Brevo: BREVO_API_KEY + BREVO_SENDER_EMAIL (remitente
          # verificado en Brevo) + SITE_URL (URL pública del sitio). Opcional:
          # BREVO_SENDER_NAME (default "Comparador de portátiles").
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          BREVO_SENDER_EMAIL: ${{ secrets.BREVO_SENDER_EMAIL }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: npm run scrape:catalog -- --check-alerts
